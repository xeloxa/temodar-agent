name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ai/node_runner/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm --prefix ai/node_runner ci

      - name: Build Node runner
        run: npm --prefix ai/node_runner run build

      - name: Run Node tests
        run: npm --prefix ai/node_runner run test

      - name: Run Python tests
        run: pytest

      - name: Build Docker image
        run: |
          docker build \
            --build-arg TEMODAR_AGENT_IMAGE_VERSION=ci \
            --build-arg TEMODAR_AGENT_IMAGE_TAG=${GITHUB_REF_NAME} \
            --build-arg TEMODAR_AGENT_IMAGE_BUILD=${GITHUB_SHA} \
            -t temodar-agent:ci \
            .
