name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ai/node_runner/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm --prefix ai/node_runner ci

      - name: Build Node runner
        run: npm --prefix ai/node_runner run build

      - name: Run Node tests
        run: npm --prefix ai/node_runner run test

      - name: Run Python tests
        run: python -m pytest

      - name: Build Docker image
        run: |
          docker build \
            --build-arg TEMODAR_AGENT_IMAGE_VERSION=ci \
            --build-arg TEMODAR_AGENT_IMAGE_TAG=${GITHUB_REF_NAME} \
            --build-arg TEMODAR_AGENT_IMAGE_BUILD=${GITHUB_SHA} \
            -t temodar-agent:ci \
            .

      - name: Smoke test Docker image
        shell: bash
        run: |
          docker rm -f temodar-agent-ci-smoke >/dev/null 2>&1 || true
          trap 'docker logs temodar-agent-ci-smoke || true; docker rm -f temodar-agent-ci-smoke >/dev/null 2>&1 || true' EXIT
          docker run -d --name temodar-agent-ci-smoke -p 18080:8080 temodar-agent:ci
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:18080/ >/dev/null; then
              break
            fi
            sleep 2
          done
          curl --fail --silent http://127.0.0.1:18080/ >/dev/null
          curl --fail --silent http://127.0.0.1:18080/api/system/update >/tmp/temodar-system-update.json
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('/tmp/temodar-system-update.json').read_text(encoding='utf-8'))
          required = {
              'current_version',
              'current_tag',
              'runtime_status',
              'status',
              'update_available',
              'manual_update_required',
          }
          missing = required - payload.keys()
          if missing:
              raise SystemExit(f'Missing keys from /api/system/update: {sorted(missing)}')
          PY
          docker rm -f temodar-agent-ci-smoke >/dev/null 2>&1 || true
          trap - EXIT
