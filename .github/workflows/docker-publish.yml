name: Docker Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  DOCKERHUB_REPOSITORY: xeloxa/temodar-agent

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.meta.outputs.app_version }}
      git_tag: ${{ steps.meta.outputs.git_tag }}
      minor_tag: ${{ steps.meta.outputs.minor_tag }}
      publish_latest: ${{ steps.meta.outputs.publish_latest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          APP_VERSION=$(python -c "import re, pathlib; text = pathlib.Path('app_meta.py').read_text(encoding='utf-8'); match = re.search(r'^__version__\\s*=\\s*[\"\']([^\"\']+)[\"\']', text, re.MULTILINE); print(match.group(1) if match else '')")

          if [[ -z "${APP_VERSION}" ]]; then
            echo "Unable to determine __version__ from app_meta.py" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "This workflow only publishes from git tags." >&2
            exit 1
          fi

          GIT_TAG="${GITHUB_REF_NAME}"
          CLEAN_TAG="${GIT_TAG#v}"

          if [[ "${APP_VERSION}" != "${CLEAN_TAG}" ]]; then
            echo "Tag ${GIT_TAG} does not match app_meta.py version ${APP_VERSION}" >&2
            exit 1
          fi

          MINOR_TAG=$(python -c "import sys; parts = sys.argv[1].split('.'); assert len(parts) >= 2, 'Expected semantic version with at least major.minor'; print('.'.join(parts[:2]))" "${APP_VERSION}")

          {
            echo "app_version=${APP_VERSION}"
            echo "git_tag=${GIT_TAG}"
            echo "minor_tag=${MINOR_TAG}"

            if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
              echo "publish_latest=false"
            else
              echo "publish_latest=true"
            fi
          } >> "${GITHUB_OUTPUT}"

  validate:
    needs: metadata
    uses: ./.github/workflows/reusable-validate.yml
    with:
      image_version: ${{ needs.metadata.outputs.app_version }}
      image_tag: ${{ needs.metadata.outputs.git_tag }}
      image_build: ${{ github.sha }}
      run_smoke: true
      release_mode: true

  publish:
    needs:
      - metadata
      - validate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_REPOSITORY }}
          tags: |
            type=raw,value=latest,enable=${{ needs.metadata.outputs.publish_latest }}
            type=raw,value=${{ needs.metadata.outputs.app_version }}
            type=raw,value=${{ needs.metadata.outputs.git_tag }}
            type=raw,value=${{ needs.metadata.outputs.minor_tag }}
          labels: |
            org.opencontainers.image.title=Temodar Agent
            org.opencontainers.image.description=AI agent-powered WordPress security scanner
            org.opencontainers.image.version=${{ needs.metadata.outputs.app_version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            TEMODAR_AGENT_IMAGE_VERSION=${{ needs.metadata.outputs.app_version }}
            TEMODAR_AGENT_IMAGE_TAG=${{ needs.metadata.outputs.git_tag }}
            TEMODAR_AGENT_IMAGE_BUILD=${{ github.sha }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
