name: Reusable Validate

on:
  workflow_call:
    inputs:
      image_version:
        description: Runtime version metadata passed into the Docker build.
        required: true
        type: string
      image_tag:
        description: Runtime tag metadata passed into the Docker build.
        required: true
        type: string
      image_build:
        description: Runtime build identifier passed into the Docker build.
        required: true
        type: string
      run_smoke:
        description: Run Docker smoke validation for the built image.
        required: true
        type: boolean
      release_mode:
        description: Select the release-parity local image reference.
        required: true
        type: boolean
    outputs:
      validated_image_ref:
        description: Local image reference that passed reusable validation.
        value: ${{ jobs.validate.outputs.validated_image_ref }}
      runtime_contract_ok:
        description: Whether the /api/system/update smoke contract passed.
        value: ${{ jobs.validate.outputs.runtime_contract_ok }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      validated_image_ref: ${{ steps.image-ref.outputs.value }}
      runtime_contract_ok: ${{ steps.smoke-output.outputs.value }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve validated image reference
        id: image-ref
        shell: bash
        run: |
          if [[ "${{ inputs.release_mode }}" == 'true' ]]; then
            echo 'value=temodar-agent:release-validation' >> "${GITHUB_OUTPUT}"
          else
            echo 'value=temodar-agent:ci-validation' >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ai/node_runner/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm --prefix ai/node_runner ci

      - name: Build Node runner
        run: npm --prefix ai/node_runner run build

      - name: Run Node tests
        run: npm --prefix ai/node_runner run test

      - name: Run Python tests
        run: TEMODAR_AGENT_DB=/tmp/temodar-agent-ci.db python -m pytest

      - name: Build Docker image
        run: |
          docker build \
            --label org.opencontainers.image.title="Temodar Agent" \
            --label org.opencontainers.image.description="AI agent-powered WordPress security scanner" \
            --label org.opencontainers.image.version="${{ inputs.image_version }}" \
            --label org.opencontainers.image.revision="${{ inputs.image_build }}" \
            --label org.opencontainers.image.source="${{ github.server_url }}/${{ github.repository }}" \
            --build-arg TEMODAR_AGENT_IMAGE_VERSION=${{ inputs.image_version }} \
            --build-arg TEMODAR_AGENT_IMAGE_TAG=${{ inputs.image_tag }} \
            --build-arg TEMODAR_AGENT_IMAGE_BUILD=${{ inputs.image_build }} \
            -t ${{ steps.image-ref.outputs.value }} \
            .

      - name: Smoke test Docker image
        if: ${{ inputs.run_smoke }}
        shell: bash
        run: |
          docker rm -f temodar-agent-validation-smoke temodar-agent-validation-smoke-recreated >/dev/null 2>&1 || true
          docker volume rm temodar-agent-validation-data temodar-agent-validation-plugins temodar-agent-validation-semgrep >/dev/null 2>&1 || true
          docker volume create temodar-agent-validation-data >/dev/null
          docker volume create temodar-agent-validation-plugins >/dev/null
          docker volume create temodar-agent-validation-semgrep >/dev/null
          cleanup() {
            docker logs temodar-agent-validation-smoke || true
            docker logs temodar-agent-validation-smoke-recreated || true
            docker rm -f temodar-agent-validation-smoke temodar-agent-validation-smoke-recreated >/dev/null 2>&1 || true
            docker volume rm temodar-agent-validation-data temodar-agent-validation-plugins temodar-agent-validation-semgrep >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          wait_for_http() {
            local url="$1"
            for _ in {1..30}; do
              if curl --fail --silent "$url" >/dev/null; then
                return 0
              fi
              sleep 2
            done
            curl --fail --silent "$url" >/dev/null
          }
          run_container() {
            local name="$1"
            docker run -d --name "$name" -p 18080:8080 \
              -v temodar-agent-validation-data:/home/appuser/.temodar-agent \
              -v temodar-agent-validation-plugins:/app/Plugins \
              -v temodar-agent-validation-semgrep:/app/semgrep_results \
              ${{ steps.image-ref.outputs.value }}
          }

          verify_writable_mounts() {
            local name="$1"
            docker exec "$name" sh -lc 'id && touch /home/appuser/.temodar-agent/write-test && touch /app/Plugins/write-test && touch /app/semgrep_results/write-test'
          }
          run_container temodar-agent-validation-smoke
          wait_for_http http://127.0.0.1:18080/health
          verify_writable_mounts temodar-agent-validation-smoke
          curl --fail --silent http://127.0.0.1:18080/api/system/update >/tmp/temodar-system-update.json
          docker exec temodar-agent-validation-smoke python - <<'PY'
          from pathlib import Path
          runtime_root = Path('/home/appuser/.temodar-agent')
          (runtime_root / 'acceptance').mkdir(parents=True, exist_ok=True)
          (runtime_root / 'acceptance' / 'persistence.txt').write_text('persisted across restart and recreate', encoding='utf-8')
          PY
          docker restart temodar-agent-validation-smoke >/dev/null
          wait_for_http http://127.0.0.1:18080/health
          docker exec temodar-agent-validation-smoke python - <<'PY'
          from pathlib import Path
          marker = Path('/home/appuser/.temodar-agent/acceptance/persistence.txt')
          assert marker.read_text(encoding='utf-8') == 'persisted across restart and recreate'
          PY
          docker rm -f temodar-agent-validation-smoke >/dev/null
          run_container temodar-agent-validation-smoke-recreated
          wait_for_http http://127.0.0.1:18080/health
          verify_writable_mounts temodar-agent-validation-smoke-recreated
          curl --fail --silent http://127.0.0.1:18080/api/system/update >/tmp/temodar-system-update-recreated.json
          docker exec temodar-agent-validation-smoke-recreated python - <<'PY'
          from pathlib import Path
          marker = Path('/home/appuser/.temodar-agent/acceptance/persistence.txt')
          assert marker.read_text(encoding='utf-8') == 'persisted across restart and recreate'
          PY
          python - <<'PY'
          import json
          from pathlib import Path
          required = {
              'current_version',
              'current_tag',
              'runtime_status',
              'status',
              'update_available',
              'manual_update_required',
          }
          for name in ('/tmp/temodar-system-update.json', '/tmp/temodar-system-update-recreated.json'):
            payload = json.loads(Path(name).read_text(encoding='utf-8'))
            missing = required - payload.keys()
            if missing:
              raise SystemExit(f'Missing keys from {name}: {sorted(missing)}')
          PY
          trap - EXIT
          cleanup

      - name: Emit smoke result for callers
        id: smoke-output
        shell: bash
        run: |
          if [[ "${{ inputs.run_smoke }}" == 'true' ]]; then
            echo 'value=true' >> "${GITHUB_OUTPUT}"
          else
            echo 'value=false' >> "${GITHUB_OUTPUT}"
          fi
