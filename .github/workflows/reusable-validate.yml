name: Reusable Validate

on:
  workflow_call:
    inputs:
      image_version:
        description: Runtime version metadata passed into the Docker build.
        required: true
        type: string
      image_tag:
        description: Runtime tag metadata passed into the Docker build.
        required: true
        type: string
      image_build:
        description: Runtime build identifier passed into the Docker build.
        required: true
        type: string
      run_smoke:
        description: Run Docker smoke validation for the built image.
        required: true
        type: boolean
      release_mode:
        description: Select the release-parity local image reference.
        required: true
        type: boolean
      publish_artifact_name:
        description: Artifact name used to export the validated image for downstream jobs.
        required: false
        default: validated-image
        type: string
    outputs:
      validated_image_ref:
        description: Local image reference that passed reusable validation.
        value: ${{ jobs.validate.outputs.validated_image_ref }}
      runtime_contract_ok:
        description: Whether the /api/system/update smoke contract passed.
        value: ${{ jobs.validate.outputs.runtime_contract_ok }}
      validated_image_artifact:
        description: Artifact containing the validated Docker image tarball.
        value: ${{ jobs.validate.outputs.validated_image_artifact }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      validated_image_ref: ${{ steps.image-ref.outputs.value }}
      runtime_contract_ok: ${{ steps.smoke-output.outputs.value }}
      validated_image_artifact: ${{ steps.artifact-name.outputs.value }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve validated image reference
        id: image-ref
        shell: bash
        run: |
          if [[ "${{ inputs.release_mode }}" == 'true' ]]; then
            echo 'value=temodar-agent:release-validation' >> "${GITHUB_OUTPUT}"
          else
            echo 'value=temodar-agent:ci-validation' >> "${GITHUB_OUTPUT}"
          fi

      - name: Resolve validated image artifact name
        id: artifact-name
        shell: bash
        run: echo "value=${{ inputs.publish_artifact_name }}" >> "${GITHUB_OUTPUT}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ai/node_runner/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm --prefix ai/node_runner ci

      - name: Build Node runner
        run: npm --prefix ai/node_runner run build

      - name: Run Node tests
        run: npm --prefix ai/node_runner run test

      - name: Run Python tests
        run: python -m pytest

      - name: Build Docker image
        run: |
          docker build \
            --label org.opencontainers.image.title="Temodar Agent" \
            --label org.opencontainers.image.description="AI agent-powered WordPress security scanner" \
            --label org.opencontainers.image.version="${{ inputs.image_version }}" \
            --label org.opencontainers.image.revision="${{ inputs.image_build }}" \
            --label org.opencontainers.image.source="${{ github.server_url }}/${{ github.repository }}" \
            --build-arg TEMODAR_AGENT_IMAGE_VERSION=${{ inputs.image_version }} \
            --build-arg TEMODAR_AGENT_IMAGE_TAG=${{ inputs.image_tag }} \
            --build-arg TEMODAR_AGENT_IMAGE_BUILD=${{ inputs.image_build }} \
            -t ${{ steps.image-ref.outputs.value }} \
            .

      - name: Smoke test Docker image
        if: ${{ inputs.run_smoke }}
        shell: bash
        run: |
          docker rm -f temodar-agent-validation-smoke >/dev/null 2>&1 || true
          trap 'docker logs temodar-agent-validation-smoke || true; docker rm -f temodar-agent-validation-smoke >/dev/null 2>&1 || true' EXIT
          docker run -d --name temodar-agent-validation-smoke -p 18080:8080 ${{ steps.image-ref.outputs.value }}
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:18080/ >/dev/null; then
              break
            fi
            sleep 2
          done
          curl --fail --silent http://127.0.0.1:18080/ >/dev/null
          curl --fail --silent http://127.0.0.1:18080/api/system/update >/tmp/temodar-system-update.json
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('/tmp/temodar-system-update.json').read_text(encoding='utf-8'))
          required = {
              'current_version',
              'current_tag',
              'runtime_status',
              'status',
              'update_available',
              'manual_update_required',
          }
          missing = required - payload.keys()
          if missing:
              raise SystemExit(f'Missing keys from /api/system/update: {sorted(missing)}')
          PY
          docker rm -f temodar-agent-validation-smoke >/dev/null 2>&1 || true
          trap - EXIT

      - name: Export validated image
        if: ${{ inputs.release_mode }}
        shell: bash
        run: docker save "${{ steps.image-ref.outputs.value }}" -o /tmp/validated-image.tar

      - name: Upload validated image artifact
        if: ${{ inputs.release_mode }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.value }}
          path: /tmp/validated-image.tar
          if-no-files-found: error

      - name: Emit smoke result for callers
        id: smoke-output
        shell: bash
        run: |
          if [[ "${{ inputs.run_smoke }}" == 'true' ]]; then
            echo 'value=true' >> "${GITHUB_OUTPUT}"
          else
            echo 'value=false' >> "${GITHUB_OUTPUT}"
          fi
